name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'chat-clone/**'
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  deploy-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: portal
          path: chat-clone/portal

  deploy-streamlit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: streamlit
          path: chat-clone/streamlit

  deploy-gradio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: gradio
          path: chat-clone/gradio

  deploy-htmx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: htmx
          path: chat-clone/htmx

  deploy-htmx-fastapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: htmx-fastapi
          path: chat-clone/htmx-fastapi

  deploy-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: react
          path: chat-clone/react

  deploy-react-fastapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          service: react-fastapi
          path: chat-clone/react-fastapi
