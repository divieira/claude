{# Options panel and quick actions #}

{% macro model_badge(model) %}
<span id="model-badge" class="model-badge text-xs text-muted bg-bubble px-2.5 py-0.5 rounded-full ml-2.5">{{ model }}</span>
{% endmacro %}

{% macro prefill_input(text) %}
<input type="hidden" id="prefill-value" value="{{ text }} " />
{% endmacro %}
