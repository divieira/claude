{# Thinking trace component #}

{% macro thinking_trace(trace) %}
<details class="thinking-trace">
    <summary>
        <span>💭</span>
        <span class="label">Thinking...</span>
    </summary>
    <div class="content">
        <div class="section">
            <div class="section-title">Reasoning</div>
            <p class="reasoning">{{ trace.reasoning }}</p>
        </div>
        {% if trace.tools %}
        <div class="section">
            <div class="section-title">Tool Use</div>
            {% for tool in trace.tools %}
            <div class="tool">
                <span class="icon">⚡</span>
                <span class="name">{{ tool.name }}</span>
                <span class="query">("{{ tool.query }}")</span>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</details>
{% endmacro %}
