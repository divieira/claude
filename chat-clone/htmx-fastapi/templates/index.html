<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Chat Clone — HTMX + FastAPI + Modern CSS</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body x-data="chatApp()"
      @htmx:sse-message.window="scrollToBottom()"
      @htmx:after-swap.window="handleAfterSwap($event)">

    <div id="app-container" class="app-container">
        {% include 'partials/layout.html' %}
    </div>

    <script>
        function chatApp() {
            return {
                sidebarOpen: false,
                optionsOpen: false,
                attachedFiles: [],

                scrollToBottom() {
                    this.$nextTick(() => {
                        const container = document.querySelector('.messages-container');
                        if (container) container.scrollTop = container.scrollHeight;
                    });
                },

                handleAfterSwap(e) {
                    const prefill = document.getElementById('prefill-value');
                    if (prefill) {
                        document.getElementById('message-input').value = prefill.value;
                        document.getElementById('message-input').focus();
                        prefill.remove();
                    }
                    this.scrollToBottom();
                },

                handleFileSelect(input) {
                    Array.from(input.files).forEach(file => {
                        const size = file.size < 1024 ? file.size + ' B' :
                            file.size < 1048576 ? (file.size / 1024).toFixed(1) + ' KB' :
                            (file.size / 1048576).toFixed(1) + ' MB';
                        this.attachedFiles.push({ name: file.name, size });
                    });
                    input.value = '';
                },

                removeFile(index) {
                    this.attachedFiles.splice(index, 1);
                },

                getFilesString() {
                    return this.attachedFiles.map(f => f.name).join(', ');
                },

                submitForm() {
                    document.getElementById('files-input').value = this.getFilesString();
                },

                clearAfterSend() {
                    document.getElementById('message-input').value = '';
                    this.attachedFiles = [];
                },

                toggleSidebar() {
                    this.sidebarOpen = !this.sidebarOpen;
                    document.querySelector('.sidebar').classList.toggle('open', this.sidebarOpen);
                    document.querySelector('.sidebar-overlay').classList.toggle('visible', this.sidebarOpen);
                },

                closeSidebar() {
                    this.sidebarOpen = false;
                    document.querySelector('.sidebar').classList.remove('open');
                    document.querySelector('.sidebar-overlay').classList.remove('visible');
                }
            }
        }

        document.body.addEventListener('htmx:beforeRequest', function(e) {
            if (e.detail.elt.id === 'chat-form') {
                Alpine.$data(document.body).submitForm();
            }
        });

        document.body.addEventListener('htmx:afterRequest', function(e) {
            if (e.detail.elt.id === 'chat-form') {
                Alpine.$data(document.body).clearAfterSend();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => Alpine.$data(document.body)?.scrollToBottom(), 100);
        });
    </script>
</body>
</html>
